name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=optional
      - run: npm run lint:names
      - run: npm run build
      - run: npm test

  native:
    name: Native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
          - name: Windows x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci --include=optional
      - run: npm run lint:names
      - run: npm run build
      - run: npm test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: npm run tauri build -- --debug

  diff-check:
    name: Diff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed lines for whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "origin/$BASE_REF...HEAD"
          elif git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            git diff --check "$BEFORE_SHA...HEAD"
          else
            git diff-tree --check --root HEAD
          fi

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: >
          cargo audit --file src-tauri/Cargo.lock
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
