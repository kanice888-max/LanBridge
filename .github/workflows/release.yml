name: Prepare draft release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-release:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run version:verify
      - name: Require the release tag to match the application version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          expected="v$(node -p 'require(\"./package.json\").version')"
          test "$RELEASE_TAG" = "$expected" || {
            echo "Release tag $RELEASE_TAG does not match application version $expected" >&2
            exit 1
          }

  draft-release:
    name: Create draft release
    needs: verify-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Create or update GitHub draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          cat > release-notes.md <<EOF
          ## LanBridge $RELEASE_VERSION

          LanBridge is a Primary/Secondary local-network sync tool with explicit return-sync,
          conflict choices, and recoverable history. It is not fully automatic bidirectional sync.

          Installation packages and SHA-256 checksum files are built and uploaded manually
          from the tagged source commit.

          - Download the package that matches your architecture after the assets are attached.
          - Verify the SHA-256 checksum before installing.
          - macOS packages are ad-hoc signed and not notarized; follow the installation guide
            rather than disabling Gatekeeper.
          EOF
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --draft --title "LanBridge $RELEASE_TAG" --notes-file release-notes.md
